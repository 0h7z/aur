on:
  workflow_dispatch: ~
  push:
    branches:
      - "master"
    paths:
      - ".github/workflows/repo-sync.yml"
  schedule:
    - cron: "0 */4 * * *"

jobs:
  _7-zip-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.PAT }}
      - run: |-
          git version
          git config --global color.ui always
          git config --global log.date iso
          git config --global log.decorate short
          git remote -v
          git remote add  upstream https://github.com/archlinux/aur.git -t 7-zip-full -f
          git push origin upstream/7-zip-full:7-zip-full -f
